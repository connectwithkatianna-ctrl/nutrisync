name: Tier 4 Loophole Database Sync

on:
  schedule:
    - cron: '0 0 * * 0' # Runs at 00:00 every Sunday UTC
  workflow_dispatch: # Allows you to click "Run workflow" manually

jobs:
  update-tier4-database:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 redis

      - name: Run Scraper and Sync to Redis
        env:
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
        run: python scripts/loophole_sync.py
